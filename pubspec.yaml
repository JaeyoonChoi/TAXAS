name: taxas
description: 증여·상속 절세 플랫폼 — Taxas
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 라우팅
  go_router: ^14.2.0

  # 차트
  fl_chart: ^0.68.0

  # 로컬 저장
  shared_preferences: ^2.2.3

  # Firebase (인증·Firestore 클라우드 저장)
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7

  # 이미지 선택 (선택 시 자동 압축, base64로 Firestore에 직접 저장)
  image_picker: ^1.1.2

  # 이미지 리사이즈/재인코딩 (image_picker의 Web 압축 미지원 보완)
  image: ^4.2.0

  # HTTP — Vercel API 호출
  http: ^1.2.2

  # 해시 — 입력 변경 감지로 AI 분석 캐시 무효화
  crypto: ^3.0.3

  # UI 유틸
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  gap: ^3.0.1
  google_fonts: ^6.2.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/PretendardVariable.ttf
    - family: IropkeBatang
      fonts:
        - asset: assets/fonts/IropkeBatangM.ttf
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/NotoSansKR-Variable.ttf
  assets:
    - assets/images/
    - assets/fonts/
